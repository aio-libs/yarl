---

name: Aiohttp


on:
  merge_group:
  push:
    branches:
    - master
    paths-ignore:
    - .github/workflows/reusable-codspeed.yml
    tags:
    - v*
  pull_request:
    branches:
    - master
    paths-ignore:
    - .github/workflows/reusable-codspeed.yml


env:
  COLOR: "yes"
  FORCE_COLOR: 1
  PY_COLORS: 1


jobs:

  test-aiohttp:
    name: Aiohttp tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        branch: ['master', '3.13', '3.14']
    steps:
    - name: Checkout aiohttp
      uses: actions/checkout@v7
      with:
        repository: aio-libs/aiohttp
        ref: ${{ matrix.branch }}
        submodules: true
    - name: Checkout yarl
      uses: actions/checkout@v7
      with:
        path: vendor/yarl
    - name: Setup Python
      id: python-install
      # important: do not use system python
      env:
        UV_PYTHON_PREFERENCE: only-managed
      uses: astral-sh/setup-uv@v8.2.0
      with:
        python-version: "3.13"
        activate-environment: true
        enable-cache: true
    - name: Update pip, wheel, setuptools
      run: uv pip install -U pip wheel setuptools
    - name: Provision the dev env
      run: make .develop PIP="uv pip"
    - name: Cythonize yarl
      working-directory: vendor/yarl
      run: make cythonize
    - name: Install yarl
      working-directory: vendor/yarl
      run: >-
        uv pip install -e .
    - name: Run tests
      # aiohttp 3.14+ no longer enables xdist via its setup.cfg, so pass
      # --numprocesses=auto here to keep the run parallel on every branch.
      run: python -m pytest --numprocesses=auto
      shell: bash

...
