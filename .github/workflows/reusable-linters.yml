---

name: Linters

on:
  workflow_call:

env:
  COLOR: >-  # Supposedly, pytest or coveragepy use this
    yes
  FORCE_COLOR: 1  # Request colored output from CLI tools supporting it
  MYPY_FORCE_COLOR: 1  # MyPy's color enforcement
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PIP_NO_PYTHON_VERSION_WARNING: 1
  PIP_NO_WARN_SCRIPT_LOCATION: 1
  PRE_COMMIT_COLOR: always
  PY_COLORS: 1  # Recognized by the `py` package, dependency of `pytest`
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1
  PYTHON_LATEST: 3.12

jobs:

  lint:
    name: Linter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Python ${{ env.PYTHON_LATEST }}
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ env.PYTHON_LATEST }}
        activate-environment: true
        enable-cache: true
    - name: Cache pre-commit.com virtualenvs
      uses: actions/cache@v5
      with:
        path: ~/.cache/pre-commit
        key: >-
          ${{
            runner.os
          }}-pre-commit-${{
            hashFiles('.pre-commit-config.yaml')
          }}
    - name: Install dependencies
      run: uv pip install -r requirements/lint.txt
    - name: Self-install
      run: uv pip install .
    - name: Run linters
      run: |
        make lint
    - name: Send coverage data to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        debug: ${{ runner.debug == 1 && true || false }}
        fail-on-error: ${{ runner.debug == 1 && false || true }}
        files: >-
          .tox/.tmp/.mypy/python-3.11/cobertura.xml
        flag-name: MyPy
        format: cobertura
        measure: ${{ runner.debug == 1 && true || false }}
    - name: Install spell checker
      run: |
        sudo apt install libenchant-2-dev
        uv pip install -r requirements/doc-spelling.txt
    - name: Run docs spelling
      run: |
        make doc-spelling
    - name: Prepare twine checker
      run: |
        uv pip install -U build twine
        python -m build --config-setting=pure-python=true
    - name: Run twine checker
      run: |
        twine check --strict dist/*

...
